<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap 4 Custom Forms Demo</title>
  <!-- Bootstrap 4 CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body class="p-4">

  <h2>Bootstrap 4 Custom Forms</h2>

  <!-- Custom Checkbox -->
  <h4>Custom Checkbox</h4>
  <div class="custom-control custom-checkbox mb-3">
    <input type="checkbox" class="custom-control-input" id="customCheck1">
    <label class="custom-control-label" for="customCheck1">Check this custom box</label>
  </div>

  <!-- Custom Switch -->
  <h4>Custom Switch</h4>
  <div class="custom-control custom-switch mb-3">
    <input type="checkbox" class="custom-control-input" id="customSwitch1">
    <label class="custom-control-label" for="customSwitch1">Toggle this switch</label>
  </div>

  <!-- Custom Radio Buttons -->
  <h4>Custom Radio Buttons</h4>
  <div class="custom-control custom-radio mb-2">
    <input type="radio" id="customRadio1" name="customRadio" class="custom-control-input">
    <label class="custom-control-label" for="customRadio1">Option 1</label>
  </div>
  <div class="custom-control custom-radio mb-2">
    <input type="radio" id="customRadio2" name="customRadio" class="custom-control-input">
    <label class="custom-control-label" for="customRadio2">Option 2</label>
  </div>

  <!-- Inline Custom Form Controls -->
  <h4>Inline Custom Form Controls</h4>
  <div class="custom-control custom-radio custom-control-inline">
    <input type="radio" id="inlineRadio1" name="inlineRadio" class="custom-control-input">
    <label class="custom-control-label" for="inlineRadio1">Inline 1</label>
  </div>
  <div class="custom-control custom-radio custom-control-inline">
    <input type="radio" id="inlineRadio2" name="inlineRadio" class="custom-control-input">
    <label class="custom-control-label" for="inlineRadio2">Inline 2</label>
  </div>

  <!-- Custom Select Menu -->
  <h4>Custom Select Menu</h4>
  <select class="custom-select mb-3">
    <option selected>Open this select menu</option>
    <option value="1">Option 1</option>
    <option value="2">Option 2</option>
  </select>

  <!-- Custom Select Menu Size -->
  <h4>Custom Select Menu Size</h4>
  <select class="custom-select custom-select-lg mb-2">
    <option selected>Large select menu</option>
    <option value="1">Option 1</option>
  </select>
  <select class="custom-select custom-select-sm mb-3">
    <option selected>Small select menu</option>
    <option value="1">Option 1</option>
  </select>

  <!-- Custom Range -->
  <h4>Custom Range</h4>
  <div class="form-group">
    <label for="customRange1">Example range</label>
    <input type="range" class="custom-range" id="customRange1">
  </div>

  <!-- Custom File Upload -->
  <h4>Custom File Upload</h4>
  <div class="custom-file mb-3">
    <input type="file" class="custom-file-input" id="customFile">
    <label class="custom-file-label" for="customFile">Choose file</label>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Show selected file name
    $(".custom-file-input").on("change", function() {
      var fileName = $(this).val().split("\\").pop();
      $(this).siblings(".custom-file-label").addClass("selected").html(fileName);
    });
  </script>
</body>
</html>
